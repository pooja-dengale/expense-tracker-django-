services:
  - type: web
    name: expense-tracker
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn expense_tracker.wsgi:application --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false

databases:
  - name: expense-tracker-db
    databaseName: expense_tracker
    user: expense_tracker_user
